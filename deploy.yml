name: Deploy Next.js Website

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download code from GitHub
    - name: Checkout repository
      uses: actions/checkout@v4

    # Step 2: Set up Node.js environment
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Match this to your local Node.js version
        cache: 'npm'

    # Step 3: Install dependencies and build Next.js application
    - name: Install dependencies & Build
      run: |
        npm ci
        npm run build

    # Step 4: Sync files to Ubuntu Server via rsync (skipping node_modules to save time)
    - name: Deploy to Ubuntu Server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: ".,!node_modules"
        target: "/var/www/accounts.pceastandrews.org" # Target directory on your server

    # Step 5: SSH into server, install production dependencies, and reload PM2
    - name: Production Post-Deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /var/www/my-app
          npm install --production
          pm2 reload nextjs-app --update-env
